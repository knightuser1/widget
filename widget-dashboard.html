<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:#0e0e11;
  color:#f0ede8;
  font-family:'Syne',sans-serif;
  overflow-x:hidden;
}

/* =========================
   HEADER
========================= */
.header{
  padding:28px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
}

.header h1{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2rem,4vw,3rem);
  font-weight:400;
}

.header h1 span{
  color:#e8c87a;
  font-style:italic;
}

.clock{
  text-align:right;
  font-family:'DM Mono',monospace;
}

.clock .time{
  font-size:1.5rem;
  color:#fff;
}

/* =========================
   GRID
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:16px;
  padding:0 28px 28px;
}

.card{
  background:#16161a;
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:22px;
  position:relative;
  overflow:hidden;
}

.card-title{
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:#7a7885;
  margin-bottom:16px;
  font-weight:700;
}

/* =========================
   COUNTDOWN
========================= */
.countdown{
  grid-column:span 7;
}

.cd-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.cd-name{
  font-size:1.4rem;
  font-family:'DM Serif Display',serif;
}

.edit-btn{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:#1f1f25;
  color:#fff;
  cursor:pointer;
}

.cd-units{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.cd-box{
  background:#1f1f25;
  padding:18px 10px;
  border-radius:14px;
  text-align:center;
}

.cd-number{
  font-size:2.5rem;
  color:#e8c87a;
  font-family:'DM Serif Display',serif;
}

.cd-label{
  margin-top:6px;
  font-size:.65rem;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:#7a7885;
}

/* =========================
   WATER
========================= */
.water{
  grid-column:span 5;
}

.water-number{
  font-size:3rem;
  color:#7ab8e8;
  font-family:'DM Serif Display',serif;
}

.water-number span{
  font-size:.9rem;
  color:#7a7885;
}

.glasses{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:18px 0;
}

.glass{
  width:32px;
  height:40px;
  border-radius:4px 4px 8px 8px;
  border:2px solid rgba(122,184,232,.3);
  cursor:pointer;
  transition:.3s;
  position:relative;
  overflow:hidden;
}

.glass::after{
  content:'';
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:0%;
  background:#7ab8e8;
  transition:.3s;
}

.glass.active::after{
  height:100%;
}

.glass.active{
  transform:scale(1.08);
  border-color:#7ab8e8;
}

/* =========================
   NOTES
========================= */
.notes{
  grid-column:span 6;
}

textarea{
  width:100%;
  min-height:160px;
  border:none;
  outline:none;
  border-radius:14px;
  padding:16px;
  background:#1f1f25;
  color:#fff;
  resize:none;
  font-family:'DM Mono',monospace;
}

/* =========================
   HABITS
========================= */
.habits{
  grid-column:span 6;
}

.habit{
  display:flex;
  align-items:center;
  gap:12px;
  background:#1f1f25;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.habit-check{
  width:20px;
  height:20px;
  border-radius:50%;
  border:2px solid #888;
}

.habit.done .habit-check{
  background:#a8e87a;
  border-color:#a8e87a;
}

.habit.done span{
  text-decoration:line-through;
  opacity:.6;
}

/* =========================
   QUOTE
========================= */
.quote{
  grid-column:span 12;
  text-align:center;
}

.quote-text{
  font-size:1.3rem;
  font-style:italic;
  line-height:1.6;
  max-width:700px;
  margin:auto;
  font-family:'DM Serif Display',serif;
}

.quote-author{
  margin-top:10px;
  color:#e87ab0;
  letter-spacing:.1em;
  font-size:.8rem;
}

/* =========================
   MODAL
========================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  width:min(400px,90vw);
  background:#16161a;
  border-radius:20px;
  padding:24px;
}

.modal-box h2{
  margin-bottom:18px;
}

.modal-box input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border:none;
  border-radius:10px;
  background:#1f1f25;
  color:#fff;
}

.modal-buttons{
  display:flex;
  gap:10px;
}

.modal-buttons button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.save-btn{
  background:#e8c87a;
  color:#111;
}

.cancel-btn{
  background:#1f1f25;
  color:#fff;
}

/* =========================
   MOBILE
========================= */
@media(max-width:768px){

  .grid{
    grid-template-columns:1fr;
  }

  .countdown,
  .water,
  .notes,
  .habits,
  .quote{
    grid-column:span 1;
  }

}
</style>
</head>

<body>

<div class="header">
  <h1>My <span>Dashboard</span></h1>

  <div class="clock">
    <div class="time" id="clock">00:00</div>
    <div id="date">Loading...</div>
  </div>
</div>

<div class="grid">

  <!-- COUNTDOWN -->
  <div class="card countdown">

    <div class="card-title">Countdown</div>

    <div class="cd-top">
      <div class="cd-name" id="event-name">My Event</div>
      <button class="edit-btn" onclick="openModal()">Edit</button>
    </div>

    <div class="cd-units">

      <div class="cd-box">
        <div class="cd-number" id="days">00</div>
        <div class="cd-label">Days</div>
      </div>

      <div class="cd-box">
        <div class="cd-number" id="hours">00</div>
        <div class="cd-label">Hours</div>
      </div>

      <div class="cd-box">
        <div class="cd-number" id="minutes">00</div>
        <div class="cd-label">Minutes</div>
      </div>

      <div class="cd-box">
        <div class="cd-number" id="seconds">00</div>
        <div class="cd-label">Seconds</div>
      </div>

    </div>
  </div>

  <!-- WATER -->
  <div class="card water">

    <div class="card-title">Water Intake</div>

    <div class="water-number">
      <span id="water-count">0</span><span>/8 glasses</span>
    </div>

    <div class="glasses" id="glasses"></div>

  </div>

  <!-- NOTES -->
  <div class="card notes">

    <div class="card-title">Notes</div>

    <textarea placeholder="Write something..."></textarea>

  </div>

  <!-- HABITS -->
  <div class="card habits">

    <div class="card-title">Daily Habits</div>

    <div class="habit" onclick="toggleHabit(this)">
      <div class="habit-check"></div>
      <span>Workout</span>
    </div>

    <div class="habit" onclick="toggleHabit(this)">
      <div class="habit-check"></div>
      <span>Read Book</span>
    </div>

    <div class="habit" onclick="toggleHabit(this)">
      <div class="habit-check"></div>
      <span>Study</span>
    </div>

  </div>

  <!-- QUOTE -->
  <div class="card quote">

    <div class="card-title">Daily Inspiration</div>

    <div class="quote-text" id="quote">
      “Discipline is choosing between what you want now and what you want most.”
    </div>

    <div class="quote-author">
      — Abraham Lincoln
    </div>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

  <div class="modal-box">

    <h2>Set Event</h2>

    <input type="text" id="event-input" placeholder="Event Name">

    <input type="date" id="date-input">

    <div class="modal-buttons">
      <button class="save-btn" onclick="saveEvent()">Save</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>

  </div>

</div>

<script>
/* =========================
   CLOCK
========================= */
function updateClock(){

  const now = new Date();

  const time = now.toLocaleTimeString([],{
    hour:'2-digit',
    minute:'2-digit'
  });

  const date = now.toDateString();

  document.getElementById('clock').textContent = time;
  document.getElementById('date').textContent = date;
}

setInterval(updateClock,1000);
updateClock();

/* =========================
   WATER TRACKER
========================= */
const glassesContainer = document.getElementById('glasses');
let water = 0;

for(let i=0;i<8;i++){

  const glass = document.createElement('div');

  glass.classList.add('glass');

  glass.addEventListener('click',()=>{

    if(glass.classList.contains('active')){
      glass.classList.remove('active');
      water--;
    }else{
      glass.classList.add('active');
      water++;
    }

    document.getElementById('water-count').textContent = water;

  });

  glassesContainer.appendChild(glass);
}

/* =========================
   HABITS
========================= */
function toggleHabit(el){
  el.classList.toggle('done');
}

/* =========================
   COUNTDOWN
========================= */
let targetDate = null;

function updateCountdown(){

  if(!targetDate) return;

  const now = new Date().getTime();
  const distance = targetDate - now;

  if(distance < 0) return;

  const days = Math.floor(distance / (1000*60*60*24));
  const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
  const seconds = Math.floor((distance%(1000*60))/1000);

  document.getElementById('days').textContent = days;
  document.getElementById('hours').textContent = hours;
  document.getElementById('minutes').textContent = minutes;
  document.getElementById('seconds').textContent = seconds;
}

setInterval(updateCountdown,1000);

/* =========================
   MODAL
========================= */
function openModal(){
  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

function saveEvent(){

  const name = document.getElementById('event-input').value;
  const date = document.getElementById('date-input').value;

  document.getElementById('event-name').textContent = name;

  targetDate = new Date(date).getTime();

  closeModal();
}
</script>

</body>
</html>
